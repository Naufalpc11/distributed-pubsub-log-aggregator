name: distributed-pubsub-log-aggregator

services:
  postgres:
    image: postgres:16-alpine
    container_name: uas-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - uas_net

  redis:
    image: redis:7.2-alpine
    container_name: uas-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - uas_net

  aggregator-api:
    build: ./aggregator
    container_name: uas-aggregator-api
    image: uas-aggregator:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      REDIS_URL: redis://redis:6379/0
      STREAM_NAME: events
      CONSUMER_GROUP: log-workers
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uas_net

  aggregator-worker-1:
    image: uas-aggregator:latest
    container_name: uas-aggregator-worker-1
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      REDIS_URL: redis://redis:6379/0
      STREAM_NAME: events
      CONSUMER_GROUP: log-workers
      WORKER_NAME: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aggregator-api:
        condition: service_started
    networks:
      - uas_net

  aggregator-worker-2:
    image: uas-aggregator:latest
    container_name: uas-aggregator-worker-2
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      REDIS_URL: redis://redis:6379/0
      STREAM_NAME: events
      CONSUMER_GROUP: log-workers
      WORKER_NAME: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aggregator-api:
        condition: service_started
    networks:
      - uas_net

  publisher:
    build: ./publisher
    container_name: uas-publisher
    image: uas-publisher:latest
    environment:
      TARGET_URL: http://aggregator-api:8080/publish
      TOTAL_EVENTS: 20000
      DUPLICATE_RATIO: 0.30
    depends_on:
      aggregator-api:
        condition: service_started
    networks:
      - uas_net
    profiles:
      - tools

  k6:
    image: grafana/k6:0.54.0
    container_name: uas-k6
    command: ["run", "/scripts/load-test.js"]
    environment:
      TARGET_URL: http://aggregator-api:8080
      TOTAL_EVENTS: 20000
      DUPLICATE_RATIO: 0.30
      RUN_ID: uasfinal001
    volumes:
      - ./k6:/scripts:ro
    depends_on:
      aggregator-api:
        condition: service_started
    networks:
      - uas_net
    profiles:
      - tools

volumes:
  pg_data:
  redis_data:

networks:
  uas_net:
    driver: bridge